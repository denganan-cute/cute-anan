<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想对安安说</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{
  background:#f9f0ff;
  background-image: radial-gradient(circle, #f0e0ff 1px, transparent 1px);
  background-size:20px 20px;
  padding:50px 20px;
  max-width:700px;
  margin:0 auto;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  top:10px; left:10px; right:10px; bottom:10px;
  border:4px dashed #d9b3ff;
  border-radius:30px;
  pointer-events:none;
  z-index:1;
}
.page-title{
  text-align:center;
  font-size:28px;
  color:#9966ff;
  margin-bottom:35px;
  text-shadow:2px 2px #e6ccff;
  position:relative; z-index:2;
}
.text-card{
  background:#fff;
  border:3px solid #e6ccff;
  border-radius:25px;
  padding:35px 30px;
  line-height:2;
  font-size:16px;
  color:#555;
  box-shadow:0 6px 0 #d9b3ff;
  margin-bottom:20px;
  position:relative; z-index:2;
}
.reply-title{
  font-weight:bold;
  margin-bottom:10px;
  color:#333;
  position:relative; z-index:2;
}
textarea{
  width:100%;
  height:140px;
  border:2px solid #e6ccff;
  border-radius:12px;
  padding:12px;
  background:#fefafe;
  position:relative; z-index:2;
}
.save-btn-container {
  text-align: right;
  margin-top: 10px;
  position:relative; z-index:2;
}
#saveBtn {
  padding: 10px 20px;
  background: #9966ff;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  border: 3px solid #d9b3ff;
  cursor: pointer;
}
.back{
  display:block;
  text-align:center;
  margin-top:30px;
  font-size:17px;
  font-weight:bold;
  color:#7a43e6;
  text-decoration:none;
  position:relative; z-index:2;
}
</style>
</head>
<body>
<h1 class="page-title">想对安安说</h1>
<div class="text-card">
你总是不好好吃饭，不爱喝水，爱喝饮料喝奶茶，总是虚弱，容易吐还容易晕乎乎的。我真的很希望你能好好吃饭，每天早点睡觉，身体健康，天天开心一点。其实对大多数人来说，生活本来就有平淡和难过的时候，但那些开心幸福的瞬间，才是我们要一起抓住的意义呀。(๑′ᴗ‵๑)Ｉ Lᵒᵛᵉᵧₒᵤ❤
</div>

<div class="reply-title">你有什么想对我说的吗？</div>
<textarea id="replyText" placeholder="在这里写你想对我说的话吧~"></textarea>
<div class="save-btn-container">
  <button id="saveBtn">保存</button>
</div>

<a href="index.html" class="back">返回首页</a>

<script>
// 页面加载时读取保存的内容
window.onload = function() {
  const savedText = localStorage.getItem('ananReply');
  if (savedText) {
    document.getElementById('replyText').value = savedText;
  }
};

// 保存按钮点击事件
document.getElementById('saveBtn').addEventListener('click', function() {
  const text = document.getElementById('replyText').value;
  localStorage.setItem('ananReply', text);
  alert('保存成功啦！');
});
</script>
</body>
</html>
