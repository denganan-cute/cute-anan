<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuromi Themed Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Kuromi Themed Music Player</h1>
        <nav>
            <ul>
                <li><a href="#music">Music</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <section id="music">
        <h2>Your Favorite Tunes</h2>
        <audio controls>
            <source src="music/your_favorite_song.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </section>
    <section id="gallery">
        <h2>Image Carousel Gallery</h2>
        <div class="carousel">
            <img src="images/kuromi1.jpg" alt="Kuromi 1">
            <img src="images/kuromi2.jpg" alt="Kuromi 2">
            <img src="images/kuromi3.jpg" alt="Kuromi 3">
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Kuromi Music Player. All Rights Reserved.</p>
    </footer>
</body>
</html>
