<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuromi-Themed Design</title>
    <style>
        body {
            background-color: #E0A5E0; /* Kuromi's color */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #4B0082; /* Dark purple */
        }
        .carousel {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .carousel img {
            width: 100%;
            border-radius: 15px;
        }
        .music-player {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Kuromi-Themed Page!</h1>
    <div class="carousel">
        <img src="kuromi1.jpg" alt="Kuromi Image 1">
        <img src="kuromi2.jpg" alt="Kuromi Image 2" style="display:none;">
        <img src="kuromi3.jpg" alt="Kuromi Image 3" style="display:none;">
    </div>
    <button onclick="nextImage()">Next Image</button>
    <div class="music-player">
        <audio controls loop>
            <source src="music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('.carousel img');

        function nextImage() {
            images[currentIndex].style.display = 'none';
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].style.display = 'block';
        }
    </script>
</body>
</html>
