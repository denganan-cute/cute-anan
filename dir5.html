<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的记忆碎片</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{
  background:#f9f0ff;
  background-image: radial-gradient(circle, #f0e0ff 1px, transparent 1px);
  background-size:20px 20px;
  padding:80px 20px;
  max-width:700px;
  margin:0 auto;
  text-align:center;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  top:10px; left:10px; right:10px; bottom:10px;
  border:4px dashed #d9b3ff;
  border-radius:30px;
  pointer-events:none;
  z-index:1;
}
.main-title{
  font-size:30px;
  color:#9966ff;
  margin-bottom:50px;
  text-shadow:2px 2px #e6ccff;
  position:relative; z-index:2;
}
.love-btn{
  display:inline-block;
  width:90px;
  height:90px;
  line-height:90px;
  background:#ff86d4;
  color:#fff;
  font-size:40px;
  border-radius:50%;
  text-decoration:none;
  border:3px solid #ffc6f7;
  box-shadow:0 6px 0 #f5a6e7;
  position:relative; z-index:2;
}
.back{
  display:block;
  text-align:center;
  margin-top:40px;
  font-size:17px;
  font-weight:bold;
  color:#7a43e6;
  text-decoration:none;
  position:relative; z-index:2;
}
</style>
</head>
<body>
<h1 class="main-title">我们的记忆碎片<br>一起来看看吧</h1>
<a href="album.html" class="love-btn">❤️</a>
<a href="index.html" class="back">返回首页</a>
</body>
</html>
