<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>礼物盒</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{
  background:#f9f0ff;
  background-image: radial-gradient(circle, #f0e0ff 1px, transparent 1px);
  background-size:20px 20px;
  padding:50px 20px;
  max-width:700px;
  margin:0 auto;
  text-align:center;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  top:10px; left:10px; right:10px; bottom:10px;
  border:4px dashed #d9b3ff;
  border-radius:30px;
  pointer-events:none;
  z-index:1;
}
.main-title{
  font-size:30px;
  color:#9966ff;
  margin-bottom:30px;
  text-shadow:2px 2px #e6ccff;
  position:relative; z-index:2;
}

/* 礼物盒整体 */
.gift-box{
  width: 260px;
  height: 260px;
  margin: 50px auto;
  position: relative;
  z-index: 2;
  transition: all 0.3s;
}
/* 盒盖 */
.lid{
  width: 280px;
  height: 50px;
  background: #ffc6f7;
  border: 4px solid #9966ff;
  border-radius: 12px;
  margin: 0 auto;
  position: relative;
  box-shadow: 0 6px 0 #d9b3ff;
}
.lid::before{
  content: "🎀";
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 42px;
}
/* 盒身 */
.box{
  width: 260px;
  height: 200px;
  background: #fff;
  border: 4px solid #9966ff;
  border-radius: 0 0 20px 20px;
  margin: -4px auto 0;
  position: relative;
  box-shadow: 0 8px 0 #d9b3ff;
}
.box::before{
  content: "";
  position: absolute;
  left: 50%; top:0; bottom:0;
  width: 5px;
  background: #ff86d4;
  transform: translateX(-50%);
}
.box::after{
  content: "";
  position: absolute;
  top: 50%; left:0; right:0;
  height: 5px;
  background: #ff86d4;
  transform: translateY(-50%);
}

/* 打开动画 */
.gift-box.open .lid{
  animation: lidUp 1.1s ease forwards;
}
@keyframes lidUp{
  0%{ transform: translateY(0) rotate(0); }
  100%{ transform: translateY(-70px) rotate(-18deg); opacity: 0; }
}
.gift-box.open .box{
  animation: boxFade 1.1s ease forwards;
}
@keyframes boxFade{
  0%{ transform: scale(1); }
  100%{ transform: scale(0.8); opacity: 0; }
}

/* 打开后显示的相册 */
.album{
  display: none;
  position: relative;
  z-index: 2;
  margin-top: 40px;
}
.album.show{
  display: block;
  animation: show 1s ease forwards;
}
@keyframes show{
  from{ opacity:0; transform:scale(0.5); }
  to{ opacity:1; transform:scale(1); }
}

/* 上传区域 */
.upload-box{
  margin-bottom: 20px;
}
#imgInput{
  display: none;
}
.upload-btn{
  padding: 10px 18px;
  background: #9966ff;
  color: #fff;
  font-weight: bold;
  border-radius: 16px;
  border: 3px solid #d9b3ff;
  cursor: pointer;
  display: inline-block;
}

/* 图片列表 */
.img-list{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 20px;
}
.img-item{
  aspect-ratio: 1;
  border: 3px solid #e6ccff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 0 #d9b3ff;
  background: #fff;
}
.img-item img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 爱心按钮 */
.love-btn{
  width:90px;
  height:90px;
  line-height:90px;
  background:#ff86d4;
  color:#fff;
  font-size:40px;
  border-radius:50%;
  border:3px solid #ffc6f7;
  box-shadow:0 6px 0 #f5a6e7;
  cursor:pointer;
  margin:20px auto 0;
  display: inline-block;
  position:relative; z-index:2;
}

.back{
  display:block;
  text-align:center;
  margin-top:40px;
  font-size:17px;
  font-weight:bold;
  color:#7a43e6;
  text-decoration:none;
  position:relative; z-index:2;
}
</style>
</head>

<body>

<h1 class="main-title">礼物盒<br>拆开这份礼物吧</h1>

<!-- 礼物盒 -->
<div class="gift-box" id="giftBox">
  <div class="lid"></div>
  <div class="box"></div>
</div>

<!-- 拆开后显示相册 -->
<div class="album" id="album">
  <div class="upload-box">
    <label for="imgInput" class="upload-btn">📸 添加礼物照片</label>
    <input type="file" id="imgInput" accept="image/*" multiple>
  </div>
  <div class="img-list" id="imgList"></div>
</div>

<!-- 打开爱心按钮 -->
<div class="love-btn" id="openBtn">❤️</div>

<a href="index.html" class="back">返回首页</a>

<script>
const giftBox = document.getElementById('giftBox');
const album = document.getElementById('album');
const openBtn = document.getElementById('openBtn');
const imgInput = document.getElementById('imgInput');
const imgList = document.getElementById('imgList');

// 打开礼物
openBtn.onclick = function(){
  giftBox.classList.add('open');
  setTimeout(() => {
    album.classList.add('show');
  }, 1100);
}

// 选择图片并显示
imgInput.onchange = function(){
  const files = imgInput.files;
  for(let i=0; i<files.length; i++){
    const file = files[i];
    const reader = new FileReader();
    reader.onload = function(e){
      const div = document.createElement('div');
      div.className = 'img-item';
      div.innerHTML = `<img src="${e.target.result}">`;
      imgList.appendChild(div);
    }
    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
